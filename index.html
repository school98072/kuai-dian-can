<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>快點餐</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="快點餐">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <meta name="description" content="輕鬆點餐，快速下單，好吃不等待">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon-wrap">
          <img src="icons/icon.svg" alt="" class="brand-icon" aria-hidden="true">
        </div>
        <div class="brand-text">
          <h1 class="brand-name">快點餐</h1>
          <p class="brand-sub">好吃不等待</p>
        </div>
      </div>
      <button class="cart-header-btn" id="cartBtn" aria-label="開啟購物車">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-header-badge" id="cartHeaderBadge" hidden>0</span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main-content">

    <!-- Section bar -->
    <div class="section-bar">
      <h2 class="section-title">今日菜單</h2>
      <button class="btn-custom-open" id="openCustomBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        自定義菜品
      </button>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menuGrid">
      <!-- Cards rendered by JS -->
    </div>

  </main>

  <!-- ===== FLOATING CART BUTTON ===== -->
  <button class="cart-fab" id="cartFab" hidden aria-label="查看購物車">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/>
      <circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span class="fab-badge" id="fabBadge">0</span>
  </button>

  <!-- ===== SHARED OVERLAY ===== -->
  <div class="overlay" id="overlay"></div>

  <!-- ===== CART DRAWER ===== -->
  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true" role="dialog" aria-label="購物車">
    <div class="drawer-pill" id="drawerPill"></div>
    <div class="drawer-header">
      <h3 class="drawer-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        我的訂單
      </h3>
      <button class="drawer-close-btn" id="closeDrawerBtn" aria-label="關閉購物車">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="drawer-body" id="drawerBody">
      <!-- Empty state or cart items rendered by JS -->
    </div>

    <div class="drawer-footer" id="drawerFooter" hidden>
      <div class="order-meta">
        共 <strong id="totalCount">0</strong> 道菜品
      </div>
      <button class="btn-place-order" id="placeOrderBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        立即下單
      </button>
    </div>
  </aside>

  <!-- ===== CUSTOM DISH MODAL ===== -->
  <div class="modal" id="customModal" aria-hidden="true" role="dialog" aria-label="新增自定義菜品">
    <div class="modal-header">
      <h3 class="modal-title">自定義菜品</h3>
      <button class="modal-close-btn" id="closeCustomBtn" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <!-- Image upload -->
      <label class="upload-zone" id="uploadZone" for="imgInput" aria-label="上傳菜品圖片">
        <input type="file" id="imgInput" accept="image/*" class="visually-hidden" tabindex="-1">
        <img id="imgPreview" class="img-preview" hidden alt="預覽圖片">
        <div class="upload-hint" id="uploadHint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36" opacity="0.4">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>點擊上傳圖片</p>
          <p class="upload-sub">支援 JPG、PNG（選填）</p>
        </div>
      </label>

      <div class="field-group">
        <label class="field-label" for="customName">
          菜品名稱 <span class="required-mark">*</span>
        </label>
        <input
          type="text"
          id="customName"
          class="field-input"
          placeholder="請輸入菜品名稱..."
          maxlength="30"
          autocomplete="off"
        >
      </div>

      <div class="field-group">
        <label class="field-label" for="customNote">備註說明</label>
        <textarea
          id="customNote"
          class="field-input field-textarea"
          placeholder="例如：少辣、不加蔥、多點醬汁..."
          rows="3"
          maxlength="100"
        ></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-confirm" id="addCustomItemBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        加入點餐車
      </button>
    </div>
  </div>

  <!-- ===== NOTE EDIT MODAL ===== -->
  <div class="modal" id="noteModal" aria-hidden="true" role="dialog" aria-label="編輯備註">
    <div class="modal-header">
      <h3 class="modal-title" id="noteModalTitle">加入備註</h3>
      <button class="modal-close-btn" id="closeNoteBtn" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label" for="noteInput">備註說明（選填）</label>
        <textarea
          id="noteInput"
          class="field-input field-textarea"
          placeholder="例如：少辣、不加蔥、多點醬汁..."
          rows="4"
          maxlength="100"
        ></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-confirm" id="confirmNoteBtn">確認儲存</button>
    </div>
  </div>

  <!-- ===== ORDER CONFIRM MODAL ===== -->
  <div class="modal modal-sm" id="confirmModal" aria-hidden="true" role="dialog">
    <div class="modal-body confirm-body">
      <div class="confirm-icon">🚀</div>
      <h3 class="confirm-title">確認下單？</h3>
      <p class="confirm-sub" id="confirmSub">訂單將傳送給廚師</p>
    </div>
    <div class="modal-footer confirm-footer">
      <button class="btn-cancel" id="cancelOrderBtn">取消</button>
      <button class="btn-confirm" id="confirmOrderBtn">確認下單</button>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ===== INSTALL PROMPT ===== -->
  <div class="install-bar" id="installBar" hidden>
    <div class="install-bar-inner">
      <img src="icons/icon.svg" alt="" width="36" height="36" class="install-icon">
      <div class="install-text">
        <strong>安裝快點餐</strong>
        <span>新增到主畫面，隨時快速點餐</span>
      </div>
      <button class="btn-install" id="installBtn">安裝</button>
      <button class="btn-install-dismiss" id="installDismiss" aria-label="關閉">✕</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
